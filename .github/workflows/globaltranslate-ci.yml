name: GlobalTranslate CI/CD

on:
  push:
    branches: [main]
    paths: ['globaltranslate/**']
  pull_request:
    paths: ['globaltranslate/**']

jobs:
  backend-tests:
    name: Backend — lint e testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: globaltranslate/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: globaltranslate/backend/requirements*.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Testes (pytest)
        run: pytest -v

  frontend-tests:
    name: Frontend — análise e testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: globaltranslate/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependências
        run: flutter pub get

      - name: Análise estática
        run: flutter analyze --no-fatal-infos

      - name: Testes
        run: flutter test

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (sem push)
        uses: docker/build-push-action@v6
        with:
          context: globaltranslate/backend
          push: false
          tags: globaltranslate-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (produção)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH no VPS
        # Requer os secrets VPS_HOST, VPS_USER e VPS_SSH_KEY no ambiente "production"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/globaltranslate
            ./scripts/deploy_vps.sh
