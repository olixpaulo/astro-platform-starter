name: globaltranslate
description: Tradução multilíngue com IA — texto, voz, câmara e documentos.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado e navegação
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Rede e armazenamento
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Voz, câmara e ficheiros
  record: ^5.1.0
  audioplayers: ^6.0.0
  image_picker: ^1.1.2
  file_picker: ^8.0.5

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
